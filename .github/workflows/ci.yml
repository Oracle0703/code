name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Quality and package
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure Linux GUI smoke dependencies
        run: |
          if ! command -v xvfb-run >/dev/null || ! command -v xauth >/dev/null; then
            sudo apt-get update
            sudo apt-get install --no-install-recommends --yes xvfb xauth
          fi

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build real Electron download smoke bundle
        run: npm run build:electron-download-smoke

      - name: Build production TerminalManager smoke bundle
        run: npm run build:terminal-manager-smoke

      - name: Smoke-test Electron downloads
        run: |
          node -e "require('electron')"
          electron_path="$(node -p "require('electron')")"
          test -x "$electron_path"
          xvfb-run -a \
            --server-args='-screen 0 1280x720x24' \
            "$electron_path" \
            --no-sandbox \
            --disable-gpu \
            reports/electron-download-smoke/electron-download-smoke.cjs

      - name: Audit complete dependency tree
        run: npm run audit:all

      - name: Upload complete dependency audit
        if: ${{ always() && hashFiles('reports/npm-audit.json') != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-audit-${{ github.run_id }}-${{ github.run_attempt }}
          path: reports/npm-audit.json
          if-no-files-found: error
          retention-days: 30

      - name: Audit production dependencies
        run: npm run audit:prod

      - name: Package Electron app
        run: npm run package:linux

      - name: Build real database service smoke bundle
        run: npm run build:database-smoke

      - name: Verify packaged app and Electron fuses
        run: node scripts/verify-packaged-app.mjs 'out/Daily Workbench-linux-x64/daily-workbench' 70

      - name: Smoke-test packaged terminal
        timeout-minutes: 2
        env:
          ELECTRON_RUN_AS_NODE: '1'
        run: |
          asar_path="$PWD/out/Daily Workbench-linux-x64/resources/app.asar"
          smoke_root="$(mktemp -d "$RUNNER_TEMP/daily-workbench-terminal-smoke.XXXXXX")"
          trap 'rm -rf -- "$smoke_root"' EXIT
          cp reports/terminal-smoke/terminal-manager-smoke.cjs "$smoke_root/terminal-manager-smoke.cjs"
          DAILY_WORKBENCH_PACKAGED_ASAR="$asar_path" \
            NODE_PATH="$asar_path/node_modules" \
            timeout --kill-after=5s 90s \
            'out/Daily Workbench-linux-x64/daily-workbench' \
            "$smoke_root/terminal-manager-smoke.cjs"

      - name: Smoke-test packaged database
        env:
          ELECTRON_RUN_AS_NODE: '1'
        run: |
          'out/Daily Workbench-linux-x64/daily-workbench' \
            reports/database-smoke/database-service-smoke.cjs
          'out/Daily Workbench-linux-x64/daily-workbench' \
            scripts/smoke-packaged-database.cjs \
            'out/Daily Workbench-linux-x64/resources/app.asar'

  windows-package:
    name: Windows package smoke test
    # node-gyp bundled by Electron Forge does not yet recognize Visual Studio 2026.
    # Pin VS 2022 instead of inheriting the moving windows-latest image.
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test terminal ownership and protocol
        run: npm run test:terminal

      - name: Build real Electron download smoke bundle
        run: npm run build:electron-download-smoke

      - name: Build production TerminalManager smoke bundle
        run: npm run build:terminal-manager-smoke

      - name: Smoke-test Electron downloads
        shell: pwsh
        run: |
          node -e "require('electron')"
          if ($LASTEXITCODE -ne 0) {
            throw 'Could not install the pinned Electron executable.'
          }
          $electronPath = (node -p "require('electron')").Trim()
          if ($LASTEXITCODE -ne 0) {
            throw 'Could not resolve the pinned Electron executable.'
          }
          if (-not (Test-Path $electronPath -PathType Leaf)) {
            throw "Could not find the pinned Electron executable: $electronPath"
          }
          & $electronPath 'reports\electron-download-smoke\electron-download-smoke.cjs'
          if ($LASTEXITCODE -ne 0) {
            throw "Electron download smoke test failed with exit code $LASTEXITCODE."
          }

      - name: Build Windows installer
        run: npm run make:windows

      - name: Build real database service smoke bundle
        run: npm run build:database-smoke

      - name: Verify unpacked node-pty binaries
        shell: pwsh
        run: |
          $nativeFiles = Get-ChildItem -Path out -Recurse -File |
            Where-Object { $_.FullName -match 'node-pty' -and $_.Extension -in '.node', '.dll', '.exe' }
          if (-not $nativeFiles) {
            throw 'Packaged output does not contain unpacked node-pty native files.'
          }
          $nativeFiles | Select-Object -ExpandProperty FullName

      - name: Verify packaged app and Electron fuses
        shell: pwsh
        run: |
          $executable = Get-ChildItem -Path out -Recurse -File -Filter daily-workbench.exe |
            Where-Object { $_.FullName -match 'win32-x64' } |
            Select-Object -First 1
          if (-not $executable) {
            throw 'Could not find the packaged Daily Workbench executable.'
          }
          node scripts/verify-packaged-app.mjs $executable.FullName 170

      - name: Smoke-test packaged terminal
        timeout-minutes: 2
        shell: pwsh
        run: |
          $executable = Get-ChildItem -Path out -Recurse -File -Filter daily-workbench.exe |
            Where-Object { $_.FullName -match 'win32-x64' } |
            Select-Object -First 1
          if (-not $executable) {
            throw 'Could not find the packaged Daily Workbench executable.'
          }
          $asarPath = Join-Path $executable.Directory.FullName 'resources\app.asar'
          $env:ELECTRON_RUN_AS_NODE = '1'
          $env:NODE_PATH = Join-Path $asarPath 'node_modules'
          $env:DAILY_WORKBENCH_PACKAGED_ASAR = $asarPath
          $smokeDirectory = Join-Path $env:RUNNER_TEMP "daily-workbench-terminal-smoke-$([guid]::NewGuid())"
          New-Item -ItemType Directory -Path $smokeDirectory | Out-Null
          $managerSmoke = Join-Path $smokeDirectory 'terminal-manager-smoke.cjs'
          try {
            Copy-Item `
              -LiteralPath (Join-Path $PWD 'reports\terminal-smoke\terminal-manager-smoke.cjs') `
              -Destination $managerSmoke
            $process = Start-Process `
              -FilePath $executable.FullName `
              -ArgumentList @("`"$managerSmoke`"") `
              -NoNewWindow `
              -PassThru
            if (-not $process.WaitForExit(90000)) {
              taskkill /PID $process.Id /T /F | Out-Null
              throw 'Packaged TerminalManager smoke test timed out after 90 seconds.'
            }
            if ($process.ExitCode -ne 0) {
              throw "Packaged terminal smoke test failed with exit code $($process.ExitCode)."
            }
          } finally {
            Remove-Item -LiteralPath $smokeDirectory -Recurse -Force
          }

      - name: Smoke-test packaged database
        shell: pwsh
        run: |
          $executable = Get-ChildItem -Path out -Recurse -File -Filter daily-workbench.exe |
            Where-Object { $_.FullName -match 'win32-x64' } |
            Select-Object -First 1
          if (-not $executable) {
            throw 'Could not find the packaged Daily Workbench executable.'
          }
          $asarPath = Join-Path $executable.Directory.FullName 'resources\app.asar'
          $env:ELECTRON_RUN_AS_NODE = '1'
          $serviceProcess = Start-Process `
            -FilePath $executable.FullName `
            -ArgumentList @('reports\database-smoke\database-service-smoke.cjs') `
            -NoNewWindow `
            -Wait `
            -PassThru
          if ($serviceProcess.ExitCode -ne 0) {
            throw "Packaged DatabaseService smoke test failed with exit code $($serviceProcess.ExitCode)."
          }
          $process = Start-Process `
            -FilePath $executable.FullName `
            -ArgumentList @('scripts/smoke-packaged-database.cjs', "`"$asarPath`"") `
            -NoNewWindow `
            -Wait `
            -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Packaged database smoke test failed with exit code $($process.ExitCode)."
          }

      - name: Prepare installer artifacts and checksums
        shell: pwsh
        run: |
          $artifactDirectory = Join-Path $PWD 'out\make\squirrel.windows\x64'
          if (-not (Test-Path $artifactDirectory -PathType Container)) {
            throw "Could not find Squirrel artifact directory: $artifactDirectory"
          }

          $setupFiles = @(Get-ChildItem -Path $artifactDirectory -File -Filter 'DailyWorkbenchSetup.exe')
          $packages = @(Get-ChildItem -Path $artifactDirectory -File -Filter '*-full.nupkg')
          $releases = @(Get-ChildItem -Path $artifactDirectory -File -Filter 'RELEASES')
          if ($setupFiles.Count -ne 1 -or $packages.Count -ne 1 -or $releases.Count -ne 1) {
            throw "Expected exactly one setup EXE, full NUPKG, and RELEASES file."
          }

          $verifiedFiles = @($setupFiles[0], $packages[0], $releases[0]) | Sort-Object Name
          $checksumLines = $verifiedFiles | ForEach-Object {
            $hash = (Get-FileHash -Path $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          }
          $checksumPath = Join-Path $artifactDirectory 'SHA256SUMS.txt'
          [System.IO.File]::WriteAllLines(
            $checksumPath,
            $checksumLines,
            [System.Text.UTF8Encoding]::new($false)
          )
          Get-Content $checksumPath

      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: daily-workbench-windows-x64-${{ github.sha }}-${{ github.run_attempt }}
          path: |
            out/make/squirrel.windows/x64/DailyWorkbenchSetup.exe
            out/make/squirrel.windows/x64/*-full.nupkg
            out/make/squirrel.windows/x64/RELEASES
            out/make/squirrel.windows/x64/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
